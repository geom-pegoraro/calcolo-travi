<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>EngToolbox PWA</title>
    <meta name="description" content="Toolbox professionale per ingegneria strutturale: preventivi, analisi travi, PDF crop. Local-First, funziona offline." />
    <meta name="author" content="geom-pegoraro" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark" />

    <!-- PWA manifest — Vite PWA plugin lo genera automaticamente in /dist -->
    <link rel="manifest" href="/calcolo-travi/manifest.webmanifest" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/calcolo-travi/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/calcolo-travi/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/calcolo-travi/icons/icon-16.png" />

    <!-- Apple PWA (iOS — "Aggiungi a schermata Home") -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EngToolbox" />
    <link rel="apple-touch-icon" href="/calcolo-travi/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/calcolo-travi/icons/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/calcolo-travi/icons/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/calcolo-travi/icons/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/calcolo-travi/icons/apple-touch-icon-180x180.png" />

    <!-- Windows / Edge PWA tile -->
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/calcolo-travi/icons/icon-256.png" />
    <meta name="msapplication-config" content="none" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EngToolbox PWA" />
    <meta property="og:description" content="Toolbox professionale per ingegneria strutturale. Local-First, offline, nessun server." />
    <meta property="og:image" content="https://geom-pegoraro.github.io/calcolo-travi/icons/icon-512.png" />
    <meta property="og:url" content="https://geom-pegoraro.github.io/calcolo-travi/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- ✅ FIX: path relativo invece di assoluto /src/main.jsx -->
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
